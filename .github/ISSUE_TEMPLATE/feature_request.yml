name: "💡 功能建议"
description: "有好的想法？一起来讨论！"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 👋 你好！

        感谢你的建议！开始之前：

        - [ ] 查看 [已有功能路线图](https://github.com/entergirl/Ramaria#阶段六进行中)
        - [ ] 搜索过已有的 issue

  - type: dropdown
    id: os
    attributes:
      label: "💻 操作系统"
      options:
        - Windows 10/11
        - Ubuntu / Debian
        - 其他 Linux
        - macOS
    validations:
      required: true

  - type: input
    id: ramaria-version
    attributes:
      label: "📦 珊瑚菌版本"
      placeholder: "v0.x.x"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: "📥 安装方式"
      options:
        - "EXE 一键启动包"
        - "从源码运行"
        - "Docker"
        - "其他"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "🎯 想要解决什么问题？"
      placeholder: |
        描述你遇到的问题或痛点

        例如:
        希望能在移动端使用珊瑚菌，这样出门时也能继续对话
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "💡 建议的解决方案"
      placeholder: |
        描述你希望的功能或改进方向

        例如:
        支持移动端 Web 访问，通过手机浏览器访问局域网地址
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "🔄 是否有替代方案？"
      placeholder: |
        你考虑过其他解决方案吗？

  - type: checkboxes
    id: context
    attributes:
      label: "📎 附加信息"
      options:
        - label: "这是一个我愿意参与开发的功能"
        - label: "这与个人隐私/数据安全相关"
        - label: "希望能看到相关的技术讨论"
