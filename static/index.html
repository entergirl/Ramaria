<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <!--
    视口配置说明：
    · width=device-width：使用设备实际宽度，不缩放
    · initial-scale=1.0：初始缩放比例 1:1
    · maximum-scale=1.0, user-scalable=no：禁止用户手动缩放，
      防止双击/捏合导致布局错乱（移动端聊天应用的常见做法）
    · viewport-fit=cover：适配 iPhone 的刘海/安全区域（iOS 11+）
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- PWA 相关 meta，让页面在移动端"添加到主屏幕"时表现更像原生 App -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="珊瑚菌">
  <meta name="theme-color" content="#f7f4ef">

  <title>珊瑚菌 · 个人 AI 陪伴助手</title>

  <!--
    字体加载策略：
    1. preconnect：提前与 Google Fonts 建立连接，减少 DNS + TCP 延迟
    2. 主字体 link：实际加载 Noto Serif SC（300/400/500 三个字重）
    如需离线使用，将字体文件下载到 static/fonts/ 并在 variables.css 中
    改为 @font-face 本地引用，同时删除这两个 link 标签。
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">

  <!--
    CSS 加载顺序（有依赖关系，顺序不可调换）：
    1. variables.css  — CSS 变量定义，其余文件通过 var() 引用
    2. layout.css     — 页面整体结构（依赖变量）
    3. components.css — 各 UI 组件（依赖变量）
    4. animations.css — 动画帧定义（依赖组件类名）
  -->
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/animations.css">
</head>
<body>

<!-- ============================================================
     顶部导航栏
     sticky 定位，始终固定在视口顶部。
     ============================================================ -->
<header role="banner">

  <!-- 汉堡按钮：打开侧边栏 -->
  <button id="sidebar-toggle" aria-label="打开侧边栏" title="打开侧边栏">☰</button>

  <!-- 左侧：项目名（已简化） -->
  <div class="header-title">
    <span class="title-main">珊瑚菌</span>
  </div>

  <!-- 右侧控件区（已瘦身） -->
  <div id="controls" role="toolbar" aria-label="工具栏">

    <!-- 模式状态徽章（本地 / 线上 / 等待确认） -->
    <div id="mode-badge" role="status" aria-live="polite" aria-label="当前模式">
      <div id="mode-dot" aria-hidden="true"></div>
      <span id="mode-text">本地</span>
    </div>

    <!-- 线上/本地 Toggle 开关 -->
    <label class="toggle-wrap" title="切换本地 / 线上模式">
      <span class="toggle-label-text">线上模式</span>
      <input
        type="checkbox"
        id="mode-toggle"
        class="toggle-input"
        onchange="onToggleChange(this.checked)"
        aria-label="切换线上模式"
        role="switch"
      >
      <div class="toggle-track" aria-hidden="true"></div>
    </label>

    <!-- 主题切换按钮（亮色/暗色） -->
    <button
      id="theme-btn"
      title="切换到暗色模式"
      aria-label="切换到暗色模式"
    >🌙</button>

  </div><!-- /#controls -->
</header>


<!-- ============================================================
     侧边栏导航（T4）
     ============================================================ -->

<!-- 侧边栏遮罩 -->
<div id="sidebar-overlay" aria-hidden="true"></div>

<!-- 侧边栏 -->
<aside id="sidebar" role="navigation" aria-label="侧边导航">
  <div class="sidebar-header">
    <span class="sidebar-title">历史对话</span>
    <button id="sidebar-close" aria-label="关闭侧边栏">✕</button>
  </div>
  
  <div id="session-list" class="sidebar-body">
    <!-- 由 JS 动态填充 -->
    <div class="session-item empty-state">
      <div class="session-title">暂无历史对话</div>
      <div class="session-preview">开始与珊瑚菌对话后，对话记录会显示在这里</div>
    </div>
  </div>
  
  <div class="sidebar-footer">
    <button id="save-btn" class="sidebar-action">💾 保存对话</button>
    <a href="/static/import.html" class="sidebar-action">📥 导入对话</a>
  </div>
</aside>


<!-- ============================================================
     消息列表区
     role="log"：告知屏幕阅读器这是一个实时更新的日志区域。
     aria-live="polite"：新消息插入时，屏幕阅读器在用户闲置时读出。
     ============================================================ -->
<main
  id="messages"
  role="log"
  aria-live="polite"
  aria-label="对话内容"
  aria-relevant="additions"
></main>


<!-- ============================================================
     底部输入区
     ============================================================ -->
<div id="input-area" role="form" aria-label="消息输入区">

  <!--
    屏幕阅读器说明文字，视觉上不可见（.sr-only），但会被读出。
    id 与 textarea 的 aria-describedby 关联。
  -->
  <span id="input-hint" class="sr-only">
    输入消息后按 Enter 键发送，Shift+Enter 换行
  </span>

  <textarea
    id="user-input"
    placeholder="输入消息，Enter 发送，Shift+Enter 换行"
    rows="1"
    aria-label="消息输入框"
    aria-describedby="input-hint"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="sentences"
    spellcheck="true"
  ></textarea>

  <button
    id="send-btn"
    aria-label="发送消息"
    title="发送（Enter）"
  >↑</button>

</div><!-- /#input-area -->


<!--
  JavaScript 加载顺序（有依赖关系，顺序不可调换）：
  1. state.js — AppState，全局状态（无依赖）
  2. api.js   — API 封装（无依赖）
  3. ui.js    — UI 渲染（依赖 AppState）
  4. app.js   — 应用入口（依赖以上全部）

  放在 </body> 前：确保 DOM 已经构建完毕，
  DOMContentLoaded 事件可以正常触发。
-->
<script src="/static/js/state.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/ui.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
