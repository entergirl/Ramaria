<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <!--
    视口配置说明：
    · width=device-width：使用设备实际宽度，不缩放
    · initial-scale=1.0：初始缩放比例 1:1
    · maximum-scale=1.0, user-scalable=no：禁止用户手动缩放，
      防止双击/捏合导致布局错乱（移动端聊天应用的常见做法）
    · viewport-fit=cover：适配 iPhone 的刘海/安全区域（iOS 11+）
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- PWA 相关 meta，让页面在移动端"添加到主屏幕"时表现更像原生 App -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="珊瑚菌">
  <meta name="theme-color" content="#faf5f3">

  <title>珊瑚菌 · 个人 AI 陪伴助手</title>

  <!--
    字体加载策略：
    1. preconnect：提前与 Google Fonts 建立连接，减少 DNS + TCP 延迟
    2. 主字体 link：实际加载 Noto Serif SC（300/400/500 三个字重）
    如需离线使用，将字体文件下载到 static/fonts/ 并在 variables.css 中
    改为 @font-face 本地引用，同时删除这两个 link 标签。
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">

  <!--
    CSS 加载顺序（有依赖关系，顺序不可调换）：
    1. variables.css  — CSS 变量定义，其余文件通过 var() 引用
    2. layout.css     — 页面整体结构（依赖变量）
    3. components.css — 各 UI 组件（依赖变量）
    4. animations.css — 动画帧定义（依赖组件类名）
  -->
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/animations.css">
</head>
<body>

<!-- ============================================================
     顶部导航栏
     sticky 定位，始终固定在视口顶部。
     ============================================================ -->
<header role="banner">

  <!-- 汉堡按钮：打开侧边栏 -->
  <button id="sidebar-toggle" aria-label="打开侧边栏" title="打开侧边栏">☰</button>

  <!-- 左侧：项目名（已简化） -->
  <div class="header-title">
    <span class="title-main">珊瑚菌</span>
  </div>

  <!-- 右侧控件区（已瘦身） -->
  <div id="controls" role="toolbar" aria-label="工具栏">

    <!-- 模式状态徽章（本地 / 线上 / 等待确认） -->
    <div id="mode-badge" role="status" aria-live="polite" aria-label="当前模式">
      <div id="mode-dot" aria-hidden="true"></div>
      <span id="mode-text">本地</span>
    </div>

    <!-- 线上/本地 Toggle 开关 -->
    <label class="toggle-wrap" title="切换本地 / 线上模式">
      <span class="toggle-label-text">线上模式</span>
      <input
        type="checkbox"
        id="mode-toggle"
        class="toggle-input"
        onchange="onToggleChange(this.checked)"
        aria-label="切换线上模式"
        role="switch"
      >
      <div class="toggle-track" aria-hidden="true"></div>
    </label>

    <!-- 主题切换按钮（亮色/暗色） -->
    <button
      id="theme-btn"
      title="切换到暗色模式"
      aria-label="切换到暗色模式"
    >🌙</button>

  </div><!-- /#controls -->
</header>


<!-- ============================================================
     侧边栏导航（T4）
     ============================================================ -->

<!-- 侧边栏遮罩 -->
<div id="sidebar-overlay" aria-hidden="true"></div>

<!-- 侧边栏 -->
<aside id="sidebar" role="navigation" aria-label="侧边导航">
  <div class="sidebar-header">
    <span class="sidebar-title">历史对话</span>
    <button id="sidebar-close" aria-label="关闭侧边栏">✕</button>
  </div>
  
  <div id="session-list" class="sidebar-body">
    <!-- 由 JS 动态填充 -->
    <div class="session-item empty-state">
      <div class="session-title">暂无历史对话</div>
      <div class="session-preview">开始与珊瑚菌对话后，对话记录会显示在这里</div>
    </div>
  </div>
  
  <div class="sidebar-footer">
    <button id="save-btn"      class="sidebar-action">💾 保存对话</button>
    <a href="/static/import.html" class="sidebar-action">📥 导入对话</a>
    <a href="/static/memory.html" class="sidebar-action">🧠 记忆查看</a>
    <a href="/dashboard" class="sidebar-action">📊 系统总览</a>
    <button id="settings-btn"  class="sidebar-action">⚙️ 设置</button>
  </div>
</aside>


<!-- ============================================================
     消息列表区
     role="log"：告知屏幕阅读器这是一个实时更新的日志区域。
     aria-live="polite"：新消息插入时，屏幕阅读器在用户闲置时读出。
     ============================================================ -->

<main
  id="messages"
  role="log"
  aria-live="polite"
  aria-label="对话内容"
  aria-relevant="additions"
>
 <div class="empty-state">
    <div class="empty-icon">
          <span></span>
          <span></span>
     </div>
     <div class="empty-title">我是珊瑚菌</div>
     <div class="empty-desc">
          记录你的点滴日常，留存专属记忆<br>
          每一次交谈，都在构筑独属于你的世界<br>
      </div>
  </div>
</main>

<!-- ============================================================
     底部输入区
     ============================================================ -->
<div id="input-area" role="form" aria-label="消息输入区">

  <!--
    屏幕阅读器说明文字，视觉上不可见（.sr-only），但会被读出。
    id 与 textarea 的 aria-describedby 关联。
  -->
  <span id="input-hint" class="sr-only">
    输入消息后按 Enter 键发送，Shift+Enter 换行
  </span>

  <textarea
    id="user-input"
    placeholder=""
    rows="1"
    aria-label="消息输入框"
    aria-describedby="input-hint"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="sentences"
    spellcheck="true"
  ></textarea>

  <button
    id="send-btn"
    aria-label="发送消息"
    title="发送（Enter）"
  >↑</button>

</div><!-- /#input-area -->


<!--
  JavaScript 加载顺序（有依赖关系，顺序不可调换）：
  1. state.js — AppState，全局状态（无依赖）
  2. api.js   — API 封装（无依赖）
  3. ui.js    — UI 渲染（依赖 AppState）
  4. app.js   — 应用入口（依赖以上全部）

  放在 </body> 前：确保 DOM 已经构建完毕，
  DOMContentLoaded 事件可以正常触发。
-->
<script src="/static/js/state.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/ui.js"></script>
<script src="/static/js/app.js"></script>

<!-- ============================================================
     设置面板（浮层，点击设置按钮时显示）
     ============================================================ -->
<div id="settings-overlay" aria-hidden="true"></div>

<div id="settings-panel" role="dialog" aria-label="设置" aria-modal="true">
  <div class="settings-header">
    <span class="settings-title">设置</span>
    <button id="settings-close" aria-label="关闭设置">✕</button>
  </div>

  <div class="settings-body">

    <!-- 防抖等待时长 -->
    <div class="settings-section">
      <div class="settings-section-title">消息等待时长</div>
      <div class="settings-section-desc">
        连续发消息时，等待多少秒后再回复。调大可以让你把话说完再收到回复。
      </div>
      <div class="settings-row">
        <span class="settings-label">等待时长</span>
        <div class="settings-control">
          <input
            type="range"
            id="debounce-slider"
            min="1" max="10" step="0.5"
            aria-label="防抖等待时长（秒）"
          >
          <span class="settings-value" id="debounce-value">3秒</span>
        </div>
      </div>
    </div>

    <div class="settings-divider"></div>

    <!-- 主动推送 -->
    <div class="settings-section">
      <div class="settings-section-title">主动消息</div>
      <div class="settings-section-desc">
        开启后，黎杋枫会在你设定的时间段内主动发消息。
      </div>

      <!-- 总开关 -->
      <div class="settings-row">
        <span class="settings-label">主动消息</span>
        <label class="toggle-wrap" title="开启或关闭主动消息">
          <input
            type="checkbox"
            id="push-enabled-toggle"
            class="toggle-input"
            aria-label="主动消息开关"
            role="switch"
          >
          <div class="toggle-track" aria-hidden="true"></div>
        </label>
      </div>

      <!-- 时间窗口 -->
      <div class="settings-row" id="push-detail" style="display:none; flex-direction:column; gap:10px;">

        <div class="settings-row">
          <span class="settings-label">开始时间</span>
          <div class="settings-control">
            <input
              type="range"
              id="push-start-slider"
              min="0" max="23" step="1"
              aria-label="推送开始时间"
            >
            <span class="settings-value" id="push-start-value">8:00</span>
          </div>
        </div>

        <div class="settings-row">
          <span class="settings-label">结束时间</span>
          <div class="settings-control">
            <input
              type="range"
              id="push-end-slider"
              min="1" max="24" step="1"
              aria-label="推送结束时间"
            >
            <span class="settings-value" id="push-end-value">24:00</span>
          </div>
        </div>

        <div class="settings-row">
          <span class="settings-label">每日上限</span>
          <div class="settings-control">
            <input
              type="range"
              id="push-limit-slider"
              min="1" max="10" step="1"
              aria-label="每日推送上限"
            >
            <span class="settings-value" id="push-limit-value">4条</span>
          </div>
        </div>

      </div>
    </div>

  </div><!-- /.settings-body -->

  <div class="settings-footer">
    <button id="settings-save" class="settings-save-btn">保存</button>
  </div>
</div>

<script>
// 珊瑚菌随机 placeholder 文案
const placeholderList = [
  "和珊瑚菌说点什么吧，我也会主动找你~",
  "今天过得怎么样？和我聊聊吧^^",
  "随时聊天，我会认真听你说话><",
  "把今天的心情说给珊瑚菌听吧？",
  "想聊什么都可以，我一直都在",
  "今天一切都还顺利吗？"
];

// 随机选一句
const randomMsg = placeholderList[Math.floor(Math.random() * placeholderList.length)];

// 设置到输入框
document.getElementById("user-input").placeholder = randomMsg;
</script>

<script>
// 自动隐藏空白页（终极版，永远生效）
const emptyState = document.querySelector('.empty-state');

function checkEmpty() {
  const msgCount = document.querySelectorAll('.msg-bubble').length;
  emptyState.style.display = msgCount > 0 ? 'none' : 'flex';
}

// 页面加载检查
window.addEventListener('DOMContentLoaded', checkEmpty);

// 监听消息区域变化 → 只要有新消息 → 立刻隐藏空白页
const msgWrap = document.getElementById('messages');
const observer = new MutationObserver(checkEmpty);
observer.observe(msgWrap, { childList: true, subtree: true });
</script>



<script>
// ==============================================
// 珊瑚菌 电脑桌面系统级消息通知（后台网页也弹窗）
// ==============================================

// 1. 页面打开时，自动请求桌面通知权限（仅首次授权一次）
window.addEventListener('DOMContentLoaded', async () => {
  // 检测浏览器是否支持桌面通知
  if (window.Notification) {
    const permission = await Notification.requestPermission();
    if (permission === 'granted') {
      console.log('桌面通知权限已开启');
    }
  }
});

// 2. 核心函数：弹出电脑桌面系统通知
function showDesktopNotify(messageText) {
  // 权限未开启直接不执行
  if (!window.Notification || Notification.permission !== 'granted') return;

  // 系统桌面弹窗配置（头像、标题、内容全部自定义）
  const notify = new Notification('珊瑚菌', {
    body: messageText,
    icon: '/static/avatar/normal.png', // 你的珊瑚菌虚拟形象作为通知图标
    tag: 'coral-notify', // 消息分组，同来源消息不重复狂跳
    renotify: false
  });

  // 点击桌面弹窗：自动切回网页窗口 + 滚动到最新消息
  notify.onclick = () => {
    window.focus(); // 浏览器窗口前置弹出
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    notify.close();
  };
}
</script>

</body>
</html>
